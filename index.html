<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Code Playground</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
</head>
<body>
    <header>
        <h1>Interactive Code Playground</h1>
        <button id="toggle-theme">Toggle Dark Mode</button>
    </header>
    <main>
        <div class="editor-container">
            <div class="editor">
                <h2>HTML</h2>
                <textarea id="html-code" class="code-editor"></textarea>
            </div>
            <div class="editor">
                <h2>CSS</h2>
                <textarea id="css-code" class="code-editor"></textarea>
            </div>
            <div class="editor">
                <h2>JavaScript</h2>
                <textarea id="js-code" class="code-editor"></textarea>
            </div>
        </div>
        <div class="preview-container">
            <h2>Live Preview</h2>
            <iframe id="live-preview"></iframe>
        </div>
    </main>
    <footer>
        <button id="save-snippet">Save Snippet</button>
        <button id="load-snippet">Load Snippet</button>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
